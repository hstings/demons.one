    <meta name="description" content="{{ .Site.Params.description }}">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

        <h1><a href="/">{{ .Site.Title }}</a></h1>

<main>

    <footer>

    </footer>
</body>
</html>
