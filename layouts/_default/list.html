{{ define "main" }}
<h2>Index of {{ .Title }}</h2>

<ul class="demon-list">
    {{ range .Pages.ByParam "difficulty" }}
        <li>
            <a href="{{ .RelPermalink }}">{{ .Title }}</a>
            <span class="meta">
                by {{ .Params.creator }}
            </span>
        </li>
    {{ end }}
</ul>
{{ end }}
