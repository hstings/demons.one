{{ define "main" }}
<h2>{{ .Title }}</h2>

<ul class="demon-list">
    {{ range .Pages.ByParam "difficulty" }}
        <li>
            <a href="{{ .RelPermalink }}">{{ .Title }}</a>
            <span class="meta">
                by {{ .Params.creator }}
                <span class="badge badge-{{ urlize .Params.difficulty }}">{{ .Params.difficulty }}</span>
            </span>
        </li>
    {{ end }}
</ul>
{{ end }}
