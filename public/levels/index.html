    <script>
        (function () {
            const stored = localStorage.getItem("theme");
            const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
            if (stored === "dark" || (!stored && prefersDark)) {
                document.documentElement.setAttribute("data-theme", "dark");
            }
        })();
    </script>

    <script>
        
        (function () {
            const heroBg = document.querySelector(".hero-bg");
            if (!heroBg) return;
            let ticking = false;
            function updateParallax() {
                const heroEl = heroBg.closest(".hero");
                const heroBottom = heroEl.offsetTop + heroEl.offsetHeight;
                if (window.scrollY <= heroBottom) {
                    const ratio = window.scrollY / heroBottom;
                    heroBg.style.transform = `translateY(${ratio * 40}%)`;
                }
                ticking = false;
            }
            window.addEventListener("scroll", function () {
                if (!ticking) { requestAnimationFrame(updateParallax); ticking = true; }
            }, { passive: true });
            updateParallax();
        })();

        
        (function () {
            const toggle = document.getElementById("theme-toggle");
            const icon   = document.getElementById("theme-icon");
            const html   = document.documentElement;

            const ICONS = {
                light: "/images/misc/dark-mode-light.svg",  
                dark:  "/images/misc/dark-mode-dark.svg",   
            };
            const LOGO_ICONS = {
                light: "/images/misc/logo-light.png",
                dark:  "/images/misc/logo-dark.png",
            };

            function applyTheme(theme) {
                const logoIcon = document.getElementById("logo-icon");

                if (theme === "dark") {
                    html.setAttribute("data-theme", "dark");
                    icon.src = ICONS.dark;
                    if (logoIcon) logoIcon.src = LOGO_ICONS.dark;
                } else {
                    html.removeAttribute("data-theme");
                    icon.src = ICONS.light;
                    if (logoIcon) logoIcon.src = LOGO_ICONS.light;
                }
            }

            
            const current = html.getAttribute("data-theme") === "dark" ? "dark" : "light";
            applyTheme(current);

            toggle.addEventListener("click", function () {
                const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
                applyTheme(next);
                localStorage.setItem("theme", next);
            });
        })();
    </script>
    <script>
        
        (function () {
            const track         = document.querySelector(".carousel-track");
            if (!track) return;

            const dotsContainer = document.querySelector(".carousel-dots");
            const prevBtn       = document.querySelector(".carousel-btn-prev");
            const nextBtn       = document.querySelector(".carousel-btn-next");
            const perPage       = window.innerWidth <= 600 ? 1 : 3;
            let timer;

            const cards  = Array.from(track.children);
            const total  = cards.length;

            
            const pageCount = total - perPage + 1;
            for (let i = 0; i < pageCount; i++) {
                const dot = document.createElement("button");
                dot.className = "carousel-dot" + (i === 0 ? " active" : "");
                dot.setAttribute("aria-label", `Go to slide ${i + 1}`);
                dot.addEventListener("click", () => goTo(i));
                dotsContainer.appendChild(dot);
            }

            let current = 0;

            function goTo(index) {
                if (index > total - perPage) {
                    current = 0;
                } else if (index < 0) {
                    current = total - perPage;
                } else {
                    current = index;
                }

                const cardWidth = cards[0].offsetWidth + 12;
                track.style.transform = `translateX(${-(current * cardWidth)}px)`;

                document.querySelectorAll(".carousel-dot").forEach((dot, i) => {
                    dot.classList.toggle("active", i === current);
                });

                resetTimer();
            }

            prevBtn.addEventListener("click", () => goTo(current - 1));
            nextBtn.addEventListener("click", () => goTo(current + 1));

            function startTimer() {
                timer = setInterval(() => goTo(current + 1), 5000);
            }
            function resetTimer() {
                clearInterval(timer);
                startTimer();
            }

            track.addEventListener("mouseenter", () => clearInterval(timer));
            track.addEventListener("mouseleave", startTimer);

            startTimer();
        })();
    </script>
    <script>
        
        (function () {
            const hamburger = document.getElementById("hamburger");
            const navLinks  = document.getElementById("nav-links");
            if (!hamburger) return;

            hamburger.addEventListener("click", () => {
                hamburger.classList.toggle("open");
                navLinks.classList.toggle("open");
            });

            
            navLinks.querySelectorAll("a").forEach(link => {
                link.addEventListener("click", () => {
                    hamburger.classList.remove("open");
                    navLinks.classList.remove("open");
                });
            });
        })();
    </script>
