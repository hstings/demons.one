    <script>
        
        (function () {
            const heroBg = document.querySelector(".hero-bg");
            if (!heroBg) return;
            let ticking = false;
            function updateParallax() {
                const heroEl = heroBg.closest(".hero");
                const heroBottom = heroEl.offsetTop + heroEl.offsetHeight;
                if (window.scrollY <= heroBottom) {
                    const ratio = window.scrollY / heroBottom;
                    heroBg.style.transform = `translateY(${ratio * 40}%)`;
                }
                ticking = false;
            }
            window.addEventListener("scroll", function () {
                if (!ticking) { requestAnimationFrame(updateParallax); ticking = true; }
            }, { passive: true });
            updateParallax();
        })();

        
        (function () {
            const toggle = document.getElementById("theme-toggle");
            const icon   = document.getElementById("theme-icon");
            const html   = document.documentElement;

            const ICONS = {
                light: "/images/misc/dark-mode-light.svg",  
                dark:  "/images/misc/dark-mode-dark.svg",   
            };

            function applyTheme(theme) {
                if (theme === "dark") {
                    html.setAttribute("data-theme", "dark");
                    icon.src = ICONS.dark;
                } else {
                    html.removeAttribute("data-theme");
                    icon.src = ICONS.light;
                }
            }

            
            const current = html.getAttribute("data-theme") === "dark" ? "dark" : "light";
            applyTheme(current);

            toggle.addEventListener("click", function () {
                const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
                applyTheme(next);
                localStorage.setItem("theme", next);
            });
        })();
    </script>
